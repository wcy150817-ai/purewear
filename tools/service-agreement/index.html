<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Agreement Generator | PureWear Space</title>
    <meta name="description" content="Generate simple cleaning service agreements and contracts.">
    <link rel="stylesheet" href="../../css/style.css">
    
    <!-- 合同打印样式 -->
    <style>
        /* 打印时隐藏网站其他元素 */
        @media print {
            body * {
                visibility: hidden;
            }
            #printArea, #printArea * {
                visibility: visible;
            }
            #printArea {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
            .no-print {
                display: none !important;
            }
        }

        /* 合同文档样式 */
        .contract-container {
            background: #fff;
            padding: 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-top: 20px;
            font-family: 'Times New Roman', Times, serif; /* 合同通常用衬线字体 */
            line-height: 1.6;
        }
        
        .contract-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 30px;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }

        .contract-section {
            margin-bottom: 20px;
        }
        
        .contract-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 5px;
            text-decoration: underline;
        }

        .contract-field {
            border-bottom: 1px solid #000;
            display: inline-block;
            min-width: 200px;
            text-align: center;
            font-weight: 600;
            color: var(--primary);
        }

        .signature-box {
            display: flex;
            justify-content: space-between;
            margin-top: 60px;
        }
        
        .signature-line {
            width: 45%;
            text-align: center;
        }
        
        .signature-line hr {
            border: none;
            border-bottom: 1px solid #000;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar no-print">
        <a href="../../index.html" class="brand">✨ Pure<span>Wear Space</span></a>
        <div class="nav-menu">
            <a href="../../index.html" class="nav-link">Home</a>
            <a href="../index.html" class="nav-link active">Tools</a>
            <a href="../../resources.html" class="nav-link">Resources</a>
            <a href="../../about.html" class="nav-link">About</a>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <main>
            <div class="card no-print">
                <div class="form-header">
                    <h1>Service Agreement</h1>
                    <p>Fill in the details below to generate a simple service contract.</p>
                </div>

                <form id="contractForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="input-group">
                            <label>Service Provider Name</label>
                            <input type="text" id="providerName" class="form-control" placeholder="Your Name / Business Name">
                        </div>
                        <div class="input-group">
                            <label>Client Name</label>
                            <input type="text" id="clientName" class="form-control" placeholder="Client's Name">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Service Address</label>
                        <input type="text" id="serviceAddress" class="form-control" placeholder="e.g. 123 Main St, City">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="input-group">
                            <label>Service Frequency</label>
                            <select id="frequency" class="form-control">
                                <option>One-Time Cleaning</option>
                                <option>Weekly</option>
                                <option>Bi-Weekly</option>
                                <option>Monthly</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Service Rate ($)</label>
                            <input type="number" id="rate" class="form-control" placeholder="e.g. 150">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" id="serviceDate" class="form-control">
                    </div>

                    <div class="ad-container ad-in-content no-print">Advertisement</div>

                    <div style="display: flex; gap: 10px;">
                        <button type="button" class="btn-submit" onclick="generateContract()">GENERATE CONTRACT</button>
                        <button type="button" onclick="window.print()" class="btn-submit" style="background: var(--text-main); flex: 1;">PRINT</button>
                    </div>
                </form>
            </div>

            <!-- 打印区域 -->
            <div id="printArea">
                <div id="contractOutput" style="display:none;"></div>
            </div>

        </main>

        <!-- 侧边栏 -->
        <aside class="sidebar no-print">
            <div class="info-card">
                <h3>⚠️ Disclaimer</h3>
                <p>This is a basic template for simple jobs. For complex legal needs, consult a professional.</p>
            </div>
            
            <div class="ad-slot ad-sidebar">Ad: 300x250</div>
        </aside>
    </div>

    <script>
        function generateContract() {
            // 获取输入值
            const provider = document.getElementById('providerName').value || '________________________';
            const client = document.getElementById('clientName').value || '________________________';
            const address = document.getElementById('serviceAddress').value || '________________________';
            const frequency = document.getElementById('frequency').value;
            const rate = document.getElementById('rate').value || '______';
            const date = document.getElementById('serviceDate').value || new Date().toISOString().split('T')[0];
            const today = new Date().toLocaleDateString('en-US');

            // 合同模板
            const html = `
                <div class="contract-container">
                    <div class="contract-title">Cleaning Service Agreement</div>
                    
                    <p>This Agreement is entered into on <strong>${today}</strong>.</p>

                    <div class="contract-section">
                        <h3>1. Parties</h3>
                        <p><strong>Service Provider:</strong> <span class="contract-field">${provider}</span></p>
                        <p><strong>Client:</strong> <span class="contract-field">${client}</span></p>
                    </div>

                    <div class="contract-section">
                        <h3>2. Scope of Services</h3>
                        <p>The Provider agrees to perform standard cleaning services at the property located at:</p>
                        <p style="font-weight: bold; text-align: center;">${address}</p>
                        <p><strong>Frequency:</strong> ${frequency}.</p>
                        <p><strong>Date of Service:</strong> ${date}.</p>
                    </div>

                    <div class="contract-section">
                        <h3>3. Payment Terms</h3>
                        <p>The Client agrees to pay the Provider a total of <strong>$${rate}</strong> upon completion of the service.</p>
                        <p>Payment can be made via Cash, Check, or Venmo (as agreed).</p>
                    </div>

                    <div class="contract-section">
                        <h3>4. Cancellation Policy</h3>
                        <p>Both parties agree to provide at least 24 hours notice for cancellations or rescheduling.</p>
                    </div>

                    <div class="contract-section">
                        <h3>5. Liability</h3>
                        <p>The Provider is not responsible for pre-existing damage or wear and tear. The Provider carries basic liability insurance (optional: verify if applicable).</p>
                    </div>

                    <div class="signature-box">
                        <div class="signature-line">
                            <hr>
                            <div>Provider Signature</div>
                            <div style="font-size: 12px; color: #666;">Date: ${today}</div>
                        </div>
                        <div class="signature-line">
                            <hr>
                            <div>Client Signature</div>
                            <div style="font-size: 12px; color: #666;">Date: __________</div>
                        </div>
                    </div>
                    
                    <div style="margin-top: 40px; text-align: center; font-size: 12px; color: #999;">
                        Generated via PureWear Space
                    </div>
                </div>
            `;

            // 输出到页面
            document.getElementById('contractOutput').innerHTML = html;
            document.getElementById('contractOutput').style.display = 'block';
            
            // 滚动到合同位置
            document.getElementById('contractOutput').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
